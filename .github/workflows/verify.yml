name: verify

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.12.0

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install 'setuptools<81'
          python -m pip install -U online-judge-verify-helper

      - name: Restore verify timestamps
        id: restore-timestamps
        uses: actions/cache/restore@v4
        with:
          path: .verify-helper/timestamps.remote.json
          key: verify-timestamps-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            verify-timestamps-${{ github.ref_name }}-

      - name: Run tests
        env:
          YUKICODER_TOKEN: ${{ secrets.YUKICODER_TOKEN }}
        run: oj-verify run

      - name: Save verify timestamps
        uses: actions/cache/save@v4
        with:
          path: .verify-helper/timestamps.remote.json
          key: ${{ steps.restore-timestamps.outputs.cache-primary-key }}

      - name: Deploy documents
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          YUKICODER_TOKEN: ${{ secrets.YUKICODER_TOKEN }}
        run: oj-verify docs